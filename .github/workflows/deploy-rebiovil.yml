# main dalına her push'ta VPS'te git güncellemesi + Docker yeniden build.
# Kurulum: docs/GITHUB-ACTIONS-DEPLOY.md
name: Deploy rebiovil

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-rebiovil
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull + docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/rebi
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
