# main dalına her push'ta VPS'te git güncellemesi + Docker yeniden build.
# Kurulum: docs/GITHUB-ACTIONS-DEPLOY.md
name: Deploy rebiovil

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-rebiovil
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # VPS_SSH_KEY = Mac: base64 < ~/.ssh/gha_deploy | tr -d '\n' (tek satır, PEM değil).
      - name: SSH anahtarını dosyaya yaz (base64 → Python decode)
        env:
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import base64, os, pathlib
          b64 = os.environ["VPS_SSH_KEY_B64"].strip().replace("\n", "").replace("\r", "").replace(" ", "")
          raw = base64.standard_b64decode(b64)
          p = pathlib.Path(os.environ["RUNNER_TEMP"]) / "deploy_key"
          p.write_bytes(raw)
          p.chmod(0o600)
          if b"BEGIN" not in raw[:200]:
              raise SystemExit("Decoded file does not look like a PEM/OpenSSH key. Regenerate secret: base64 < ~/.ssh/gha_deploy | tr -d '\\n' | pbcopy")
          print("OK: key file bytes:", len(raw))
          PY
          ssh-keygen -y -f "$RUNNER_TEMP/deploy_key" > /dev/null

      - name: SSH — pull + docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ runner.temp }}/deploy_key
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            cd /opt/rebi
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
