# main dalına her push'ta VPS'te git güncellemesi + Docker yeniden build.
# Kurulum: docs/GITHUB-ACTIONS-DEPLOY.md
name: Deploy rebiovil

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-rebiovil
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Secret tek satır base64 olmalı (çok satırlı PEM Actions’ta bozuluyor → libcrypto hatası).
      - name: SSH anahtarını dosyaya yaz (base64 decode)
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"
          ssh-keygen -y -f "$RUNNER_TEMP/deploy_key" > /dev/null

      - name: SSH — pull + docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ runner.temp }}/deploy_key
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            cd /opt/rebi
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
