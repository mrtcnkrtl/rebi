# rebiovil.com — tek sunucu: nginx (80) + FastAPI (iç ağ)
# Kullanım: repo kökünde .env dosyası (deploy/env.docker.example kopyası) + deploy/.env.api

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/.env.api
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 12s
      retries: 4
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${VITE_API_URL:-https://rebiovil.com/api}
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
