# HTTPS: önce HTTP ile ayaklandırın, sertifika alındıktan sonra birlikte kullanın:
# docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
services:
  web:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/prod.https.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
