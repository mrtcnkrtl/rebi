# HTTPS — sertifikalar host’ta /etc/letsencrypt (docker volume ile bağlanır)
upstream rebi_api {
    server api:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name rebiovil.com www.rebiovil.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rebiovil.com www.rebiovil.com;

    ssl_certificate     /etc/letsencrypt/live/rebiovil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rebiovil.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://rebi_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
